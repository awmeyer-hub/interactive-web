<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>a study of instagram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a0a; height: 100%; overflow: hidden; }
    #scroll-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow-y: scroll;
      scrollbar-width: none;
      z-index: 10;
      pointer-events: all;
    }
    #scroll-container::-webkit-scrollbar { display: none; }
    #scroll-content { height: 4000px; width: 100%; }
    canvas { position: fixed !important; top: 0; left: 0; z-index: 1; pointer-events: none; }
  </style>
</head>
<body>
  <div id="scroll-container">
    <div id="scroll-content"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="sketch.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
